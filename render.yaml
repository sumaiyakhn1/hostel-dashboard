services:
  # Backend Web Service
  - type: web
    name: hostel-backend
    env: node
    rootDir: DataBase
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGO_URI
        sync: false # Set this in the Render Dashboard
      - key: PORT
        value: 5000

  # Frontend Static Site
  - type: static
    name: hostel-frontend
    env: static
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_BACKEND_URL
        fromService:
          name: hostel-backend
          type: web
          property: host
